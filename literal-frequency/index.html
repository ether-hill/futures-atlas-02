<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Literal Frequency · Source Library Data · Futures Atlas</title>
    <meta
      name="description"
      content="Word-frequency visualisations built from books in the Source Library — each one linking back to its source text."
    />
    <!-- Open Graph: go-to image + summary (used by the Share tool's transmutate) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Futures Atlas" />
    <meta property="og:title" content="Literal Frequency — Futures Atlas" />
    <meta property="og:description" content="Word-frequency visualisations built live from the Source Library — read a book's vocabulary as a cloud, a word nebula, a bubble field, or bars." />
    <meta property="og:image" content="/projects/literal-frequency.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/projects/literal-frequency.jpg" />
    <script>
      // default the global nav to dark, before first paint (no flash)
      (function () { try { if (localStorage.getItem("fa-theme") !== "light") document.documentElement.classList.add("dark"); } catch (e) {} })();
    </script>
    <!-- the one shared global nav (+ its styles) -->
    <link rel="stylesheet" href="/atlas-nav.css?v=5" data-fa-nav-css />
    <script src="/atlas-nav.js?v=5" defer></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
